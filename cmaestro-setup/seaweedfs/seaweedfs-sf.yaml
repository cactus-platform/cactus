apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: seaweedfs
  namespace: cmaestro-db
spec:
  serviceName: seaweedfs
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: seaweedfs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seaweedfs
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: seaweedfs
          image: chrislusf/seaweedfs:4.35
          imagePullPolicy: IfNotPresent
          command: ["weed"]
          args:
            - mini
            - -dir=/data
            - -ip.bind=0.0.0.0
            - -master.volumeSizeLimitMB=30000
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: seaweedfs-s3-credentials
                  key: accessKey
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: seaweedfs-s3-credentials
                  key: secretKey
          ports:
            - name: s3
              containerPort: 8333
            - name: master
              containerPort: 9333
            - name: filer
              containerPort: 8888
            - name: volume
              containerPort: 9340
          startupProbe:
            tcpSocket:
              port: master
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: s3
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: master
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 100Gi